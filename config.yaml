# =================================================================
# Stock Market Bot - Trading Configuration
# =================================================================
# All risk parameters are intentionally conservative. Adjust ONLY
# after backtesting and a 2-week paper-trading run with no losses.
# =================================================================

# FIX #36 (2026-05-16) — Pluggable market-data source (Phase 5A).
# Replaces the previous "yfinance everywhere" assumption with a
# Protocol-based architecture. Today's options:
#   yfinance  - free Yahoo scrape (default, preserves prior behaviour)
#   dhan      - real-time NSE feed via Dhan REST + WebSocket. Free
#               with a Dhan trading account; needs DHAN_CLIENT_ID
#               and DHAN_ACCESS_TOKEN in .env.
#   auto      - try Dhan first, fall back to yfinance.
# Override via DATA_SOURCE env var (highest priority).
market_data:
  source:   yfinance
  fallback: yfinance

capital:
  # 2026-05-08 — Lever A (post-Option-2 review). Bumped 100,000 → 300,000
  # (paper) after the live-day analysis showed both 2026-05-08 equity
  # trades (INFY, INDUSINDBK) hit the ``max_position_pct=25%`` size cap
  # at ₹24,633 / ₹24,648 — meaning they were SIZE-bound, not RISK-bound
  # (per-trade risk budget of ₹1,000 was only ~₹100-155 utilised). With
  # 3× capital the same signals deploy 3× the rupees, scaling expected
  # net P&L roughly linearly (gross + fees both scale linearly, so the
  # ratio holds). Backtest-projected median equity day moves from ~₹500
  # to ~₹1,500 net.
  #
  # Risk envelope is UNCHANGED — every limit downstream is %-based:
  #   * max_loss_per_trade_pct: 1.0  → ₹3,000 (was ₹1,000) per trade
  #   * max_open_positions:    2    → ₹6,000 worst-case simultaneous SL
  #   * max_daily_loss_pct:    2.0  → ₹6,000 daily kill-switch
  #   * FIX #22 invariant 1.0 × 2 = 2.0 ≤ 2.0 still holds ✓
  #   * max_position_pct:      25.0 → ₹75,000 max single position (was ₹25K)
  #   * deployable_pct:        0.80 → ₹240,000 max deployed (was ₹80K)
  #
  # NOTE: ``daily_profit_target_pct: 5.0`` (below) is intentionally LEFT
  # AT 5% — equity rides intraday trends to EOD; locking in at +1.67%
  # (₹5K on ₹300K) would prematurely close winners that historically
  # extend through afternoon. Revisit after 5 live trading days if the
  # rolling median exceeds ₹3K — at that point a tighter equity lock-in
  # is worth backtesting.
  total: 300000           # Total equity trading capital in INR (paper)
  deployable_pct: 0.80    # Use at most 80% of capital at any time

risk:
  max_daily_loss_pct: 2.0       # Halt all trading if day's loss >= 2% of capital
  max_loss_per_trade_pct: 1.0   # Stop-loss sized so max loss per trade <= 1%
  # Hard cap on TOTAL trades per day. NOTE: this is a frequency lever, NOT
  # a risk lever — each trade is still bounded by `max_loss_per_trade_pct`
  # and the day's cumulative loss is still hard-capped at `max_daily_loss_pct`
  # (2 %). Raising this lets the bot keep trading after the first 5 round-
  # trips so total daily P&L can scale up. Even if all 10 trades lose, the
  # 2 % daily-loss cap halts trading well before the count is reached.
  max_trades_per_day: 10
  # 2026-05-07 FIX #22: lowered 3 → 2 to satisfy the structural invariant
  #   max_loss_per_trade_pct × max_open_positions ≤ max_daily_loss_pct
  # which is now enforced at startup in bot/risk.py. With per_trade=1.0
  # and open=2, the worst-case simultaneous SL hit (2 × 1% = 2%) lands
  # exactly on the daily kill-switch — i.e. even an all-trades-stop-out
  # scenario can never exceed the user's "no losing days" budget. See
  # the matching note under fno.risk for the F&O-side reasoning.
  max_open_positions: 2         # Cannot hold more than this many open positions
  max_position_pct: 25.0        # No single position larger than 25% of capital
  reward_risk_ratio: 2.0        # Target gain = 2.0 * stop-loss distance
  trailing_stop: true           # Once +1R is reached, trail SL with ATR
  # ATR-based stop-loss / take-profit (applies to ALL strategies uniformly).
  # SL distance = sl_atr_mult * ATR(14)  on the bar's timeframe (5m).
  # TP distance = tp_atr_mult * ATR(14)  — i.e. reward = 2.0R by default.
  #
  # 2026-05-06: widened from 1.0 / 1.5 → 1.5 / 3.0 to give intraday
  # trades enough room to overcome fee + slippage drag. With a ₹100K
  # account and the watchlist's typical ATR (~0.5% of price), the
  # previous 1.0×ATR stop produced per-trade gross R of only ₹80-150
  # while round-trip fees + slippage cost ~₹50-100 per trade. That
  # required a >60% win rate just to break even. At 1.5×ATR / 3.0×ATR,
  # the same risk_per_trade budget produces a ~₹250 gross win vs ~₹125
  # gross loss, lowering break-even win-rate from ~64% to ~45%.
  sl_atr_mult: 1.5
  tp_atr_mult: 3.0
  # ── Trailing stop tuning (only used if trailing_stop: true) ──
  # When unrealized profit reaches `trail_activation_r` × R, ratchet the
  # stop up so we can never lose more than (R − `trail_lock_r` × R) — i.e.
  # at minimum we lock in `trail_lock_r` × R of profit. From then on the
  # stop trails at `trail_atr_mult` × ATR below the running peak.
  trail_activation_r: 1.0       # Activate once price moves +1R in our favour
  trail_lock_r: 0.5             # Lock in at least 0.5R profit (worst case)
  trail_atr_mult: 1.0           # After activation, trail at 1×ATR below peak
  # ── Daily profit lock-in ──
  # When realised + unrealised P&L for the day reaches this % of capital,
  # square off everything and stop trading for the day. Critical for hitting
  # a daily profit objective — without this, profits give back to the EOD
  # square-off. Set to 0.0 to disable.
  # On ₹50,000 capital: 5.0 = ₹2,500. On ₹1,00,000: 5.0 = ₹5,000.
  # On ₹3,00,000 (current paper capital after Lever-A bump): 5.0 = ₹15,000
  # — i.e. essentially "never fires for equity" by design (see Lever-A
  # comment under ``capital``). Revisit after 5 live trading days.
  daily_profit_target_pct: 5.0
  # FIX #37 (2026-05-16) — Fee-aware entry gate.
  # Refuse any trade whose expected round-trip fees (entry + exit at TP)
  # exceed this percentage of expected gross profit. Uses the actual
  # post-FIX-#21r fee schedule for equity/futures/options. Spread and
  # iron-condor strategies are EXEMPT (defined-risk credit P&L mechanics).
  # Set to 100 (or 0) to disable. Default 25 leaves a small margin
  # against the historical 60-day F&O fee-drag distribution.
  max_fee_pct_of_gross: 25.0

session:
  market_open: "09:15"
  trade_start: "09:30"          # Skip first 15 mins (avoid opening volatility)
  # Tightened 2026-05-04 from 14:45 → 13:30. The ADANIENT trade that day
  # entered at 14:14 with only 60 min runway before the forced 15:15
  # square-off and lost ₹151.57 because the +0.57% TP couldn't be hit
  # in time. 13:30 cutoff gives every entry ≥105 min runway — enough
  # for typical hourly volatility (0.3-0.5%) to reach TP. Reduces trade
  # count slightly but materially improves expected value per trade
  # (no per-trade risk change — this is a timing discipline parameter,
  # not a risk lever).
  trade_cutoff: "13:30"         # No NEW positions after this time
  square_off: "15:15"           # Force-close all positions at this time
  timezone: "Asia/Kolkata"

watchlist:
  # 2026-05-08 — Option-2 trim. Pinned to the 4 stocks that showed
  # POSITIVE expectancy after fees in the 60-day backtest
  # (scripts/strategy_backtest.py, run 2026-05-07 evening):
  #
  #   Stock        trades   win%   net (60d)   expect/trade
  #   HDFCBANK         45   55.6   +₹16,311        +₹362
  #   SBIN             43   44.2    +₹5,452        +₹126
  #   INDUSINDBK       46   43.5    +₹5,452        +₹119
  #   INFY             38   47.4    +₹1,098         +₹29
  #
  # The previous 10-stock watchlist (see git history) had 6 negative-
  # expectancy symbols (RELIANCE, ICICIBANK, AXISBANK, BANKBARODA, ITC,
  # TCS) whose losses cancelled the wins from these 4 plus ate ₹13K
  # net. Trimming flips aggregate net from -₹13,434 → +₹28,283 over
  # the same 60 days while keeping per-trade risk identical.
  #
  # CAVEAT: 60 days is a small sample. We will RE-EVALUATE this list
  # weekly using the same backtest. If a symbol's 60-day net dips
  # below 0 it gets dropped; if a dropped one returns to positive
  # for two consecutive weeks it gets added back.
  symbols:
    - HDFCBANK
    - INFY
    - SBIN
    - INDUSINDBK
strategies:
  # 2026-05-06: dropped vwap_revert from the enabled list. It is a pure
  # counter-trend strategy (fade rallies / catch falling knives) that on
  # this watchlist mostly produced dissent against ORB / EMA-Supertrend
  # trend signals. The Ensemble's "no dissent" voting rule then killed
  # legitimate trend trades when VWAP-revert disagreed, leaving the bot
  # to trade only at unusual regime moments — exactly the conditions
  # where retail counter-trend setups have the weakest statistical edge.
  # If you want to re-test it, add it back here AND raise ensemble
  # min_agree to 2 with the 3-strategy lineup.
  enabled:
    - orb
    - ema_supertrend
  ensemble:
    # 2026-05-07 FIX #25 — lowered 2 → 1 (single-strategy entries OK).
    #
    # Why: with min_agree=2, BOTH ORB and EMA-Supertrend had to agree
    # for an entry. But ``orb.entry_cutoff: 11:30`` means ORB always
    # returns HOLD after 11:30 IST. Combined with min_agree=2, the bot
    # could not enter ANY new trade between 11:30 and 13:30 (the
    # ``trade_cutoff``) — a 2-hour structural deadzone that EMA-
    # Supertrend alone could not break out of, no matter how clean
    # its signal was. The MTF wrapper (15m trend confirmation) is
    # ALREADY a quality filter on every member's signal; min_agree=1
    # means each member's MTF-confirmed signal can fire on its own.
    #
    # Risk envelope stays the same: per-trade SL is still capped at
    # 1% of capital (max_loss_per_trade_pct), max_open_positions is
    # still 2, and the daily kill-switch is still 2% (FIX #22 invariant
    # max_loss_per_trade_pct × max_open_positions ≤ max_daily_loss_pct
    # is satisfied by 1.0 × 2 = 2.0). The ONLY change is trade
    # frequency goes from "rare consensus" to "either strategy fires
    # if MTF-confirmed". The 2026-04-30 → 2026-05-06 history (8 trades
    # in 5 trading days, 1 win) is too small to evaluate min_agree=2
    # statistically; min_agree=1 will at least let the bot trade in
    # the ORB-cutoff window where empirically EMA-Supertrend has
    # comparable edge. To revert: set this back to 2 — but also
    # consider lifting orb.entry_cutoff or dropping ORB so the
    # post-cutoff deadzone doesn't reappear.
    min_agree: 1
  multitimeframe:
    enabled: true               # Wrap each strategy in MTF confirmation
    base_interval: "5m"         # Fast frame for primary signal
    confirm_interval: "15m"     # Slower frame must agree (trend filter)
  orb:
    range_minutes: 15           # Opening range = first 15 minutes
    breakout_buffer_pct: 0.05   # Require 0.05% break above/below range
    # 2026-05-06: only fire ORB before this time (IST). Empirically,
    # opening-range follow-through edge decays by mid-morning; later
    # "breakouts" tend to mean-revert by EOD square-off.
    entry_cutoff: "11:30"
  vwap_revert:
    deviation_pct: 0.6          # Enter when price >0.6% from VWAP
    rsi_overbought: 70
    rsi_oversold: 30
  ema_supertrend:
    ema_fast: 9
    ema_slow: 21
    supertrend_period: 10
    supertrend_multiplier: 3

research:
  enabled: true
  run_at: "08:30"               # IST. Pre-market run.
  # Pick top N picks from the auto-watchlist (15 symbols). The executor
  # scans these every minute looking for ensemble signals — so doubling
  # this from 5 → 10 doubles the number of opportunities to find a trade
  # WITHOUT changing per-trade risk (sizing/SL/TP all unchanged).
  top_n: 10

watchlist_updater:
  # 2026-05-08 — DISABLED for Option-2. The daily updater overwrites
  # ``watchlist.symbols`` with whatever its top-N volume + trend filter
  # picks, which would clobber the pinned 4-stock backtest-validated
  # list (see watchlist comment above). With the updater off the bot
  # trades exactly the 4 pinned symbols every session.
  #
  # When to re-enable:
  #   * After the user has confirmed which symbols to backtest each
  #     week, the manual workflow is to run
  #     ``python scripts/strategy_backtest.py`` and update
  #     ``watchlist.symbols`` by hand. The auto-updater can come back
  #     once the backtest is integrated as a pre-filter (i.e. the
  #     updater picks top-N by VOLUME, then the backtest filters to
  #     POSITIVE-EXPECTANCY only).
  #   * Until that integration ships, leaving this true means tomorrow
  #     morning's 08:15 IST run picks whatever 15 most-liquid stocks
  #     are trending — which has been the actual cause of much of the
  #     noise in our recent live trades.
  enabled: false
  run_at: "08:15"               # IST. Run after holiday refresh, before research.
  top_n: 15                     # Maintain a rolling watchlist of N symbols
  min_avg_volume: 500000        # Liquidity floor (avg shares/day)
  trend_lookback_days: 20       # SMA20 must slope upwards/downwards
  momentum_lookback_days: 10    # Recent return window for momentum score
  # The selected symbols are ALWAYS written back to `watchlist.symbols`
  # above so that config.yaml remains the single source of truth. This
  # is mandatory and not toggle-able by design.

execution:
  order_type: MARKET            # MARKET | LIMIT
  product: MIS                  # MIS = intraday (auto squared off by broker)
  slippage_bps: 5               # Assumed slippage for paper trading (basis points)
  # NOTE: paper-trading starting cash is NOT configured here — it is derived
  # from `capital.total` above so the YAML stays single-source-of-truth.

feed:
  use_websocket: true           # Use KiteTicker for live ticks (when broker=zerodha)
  poll_interval_seconds: 60     # Fallback polling interval when WS unavailable

backtest:
  walk_forward:
    enabled: true
    is_window_days: 60          # In-sample window length (training)
    oos_window_days: 20         # Out-of-sample window (test)
    step_days: 20               # Slide forward by this many days

logging:
  to_file: true
  dir: logs

# =================================================================
# F&O (Futures & Options) segment — fully isolated from equity
# =================================================================
# This block is the configuration for a SEPARATE bot process that you
# launch with `python -m cli run --segment fno`. It does NOT share
# state with the equity bot — different lock file (.bot.lock.fno),
# different Redis namespace (paper:state:fno, signal:fno:*),
# different capital budget, different trade journal
# (logs/trades/fno/...).
#
# Phase 1: segment isolation scaffold (DONE).
# Phase 2: index futures (NIFTY, BANKNIFTY) trading via EMA20/EMA50
#   crossover (DONE). Margin ~₹91K/lot — needs ≥₹150K capital.
# Phase 3: directional option buying — long CE on bullish cross, long
#   PE on bearish cross (DONE). Capital-efficient (max loss = full
#   premium ~₹11K/lot for NIFTY ATM weekly).
# Phase 4: vertical credit spreads (DONE). Theta on YOUR side, defined
#   max-loss = (strike width − net credit), ~₹2-5K margin/lot.
# Phase 4.5 (CURRENT): iron condors (4-leg neutral defined-risk),
#   stock options/futures lot table, dashboard Greeks.
# Phase 5: live Kite option-chain bars + multi-leg real orders +
#   real SPAN+exposure margin (skeleton in bot/broker/zerodha.py).
#
# To run alongside equity:
#   terminal 1:  python -m cli run --segment equity
#   terminal 2:  python -m cli run --segment fno
#
# CAPITAL REALITY CHECK — pick ONE F&O strategy per process:
#
#   Strategy                        Margin / lot      Fits ₹1L?
#   ---------------------------     -------------     ----------
#   futures_trend (Phase 2)         ~₹91,875          ✓ tight (1 lot, no headroom)
#   option_buy_directional (P3)     ₹11,250 (premium) ✓ comfortably (8-9 lots)
#   credit_spread (Phase 4)         ₹2-5K (defined-risk)  ✓ best fit (20-50 lots possible)
#   iron_condor (Phase 4.5)         ₹2-5K (defined-risk)  ✓ neutral bias
#
# Phase 4 default: credit_spread. Theta is on YOUR side (we sell the
# spread for credit and profit when it decays). Defined-risk = max_loss
# = strike_width − net_credit. Margin per lot is just the max_loss,
# typically ₹2-5K for ATM weekly NIFTY 100-pt verticals.
#
# Iron condor (Phase 4.5): the *neutral* analogue of credit_spread.
# Trades when EMAs CONVERGE (sideways regime) instead of crossing.
# Margin is the WORST wing's max-loss (NOT the sum of both spreads),
# making it ~50% more capital-efficient than running put + call
# spreads side-by-side.
#
# Why not run multiple F&O strategies in parallel? The Ensemble voter
# merges signals — but futures, long-options, and spreads all use
# DIFFERENT SL/TP scales (24400 spot vs ₹120 premium vs ₹70 net credit).
# Run ONE per F&O bot process. Multi-strategy needs two `--segment fno`
# processes with different config files (Phase 5 roadmap).
fno:
  # 2026-05-08 — F&O RE-ENABLED with Option-2 config (60-day backtest).
  # The bot now runs `option_buy_directional` ONLY (long ATM CE/PE on
  # EMA20/50 crosses, defined risk = full premium ~₹11K/lot for NIFTY
  # weekly), the only intraday-friendly F&O strategy with demonstrable
  # positive expectancy in the backtest:
  #
  #   strategy                  trades  win%   net (60d)   med-day   max-DD
  #   option_buy_directional       90   50.0    +₹56,097    +₹452   -₹10,793
  #   futures_trend                90   50.0    +₹69,635   -₹1,041  -₹26,724
  #   credit_spread/iron_condor (live)  10   0.0  -₹6,248   n/a      n/a
  #
  # option_buy beats futures_trend on every risk-adjusted metric: same
  # 50% win rate, lower drawdown (10% of capital vs 27%), positive
  # median day, fees only 12% of gross (vs 33% for futures). Both old
  # strategies (credit_spread, iron_condor) are theta-collection plays
  # that need multi-day holds — the intraday EOD square-off captures
  # an unprofitable mark, which is why every live trade lost.
  #
  # Why capital was bumped from ₹100K → ₹500K (paper) below: with
  # ₹100K + per-trade=1.0%, the risk gate computes
  #   risk_qty = 1000 / 105 = 9 < 75 (NIFTY lot)
  # so 1 lot is rejected at sizing — option_buy can never trade. To
  # admit 1 NIFTY lot we need either (a) capital ≥ ₹500K, OR (b)
  # max_loss_per_trade_pct ≥ 1.6%. We do (a) (1.6% per-trade × 1 max-
  # open = 1.6% daily kill-switch which preserves the user's "no
  # losing days" envelope). See backtest comments under capital +
  # risk blocks below.
  #
  # FIX #22 invariant still holds:
  #   max_loss_per_trade_pct × max_open_positions ≤ max_daily_loss_pct
  #     1.6 × 1 = 1.6 ≤ 2.0 ✓
  #
  # To revert this experiment (e.g. if 5-day live shows worse than
  # the 60-day backtest), flip `enabled: false` and the bot pauses
  # again — equity continues unaffected.
  enabled: true
  # How many calendar days BEFORE monthly expiry to roll the futures /
  # option resolver to the NEXT contract. Active futures traders roll
  # 1-2 days early because the dying contract's liquidity collapses on
  # expiry day. Default 2 = roll on expiry-week Tuesday. Set to 0 for
  # legacy behaviour (use the dying contract until expiry-day close).
  rollover_buffer_days: 2
  capital:
    # 2026-05-08 — Option-2: bumped 100,000 → 500,000 (paper) so the
    # risk gate can size 1 lot of NIFTY ATM weekly options at the
    # current per-trade-loss cap. NIFTY ATM CE/PE typical SL distance
    # is ~₹105/share → 1 lot (75 shares) needs ₹7,875 of risk budget.
    # At 1.6% per-trade × ₹500K = ₹8,000 cap, sizing approves 1 lot
    # exactly. With ₹100K we'd need 7.9% per-trade-loss-pct which
    # breaks the FIX#22 invariant (7.9 × 1 = 7.9 > 2.0 daily cap).
    #
    # Note this is PAPER capital — real margin needed to actually
    # trade these positions is the ₹11,250/lot premium (cash debit),
    # which fits the original ₹100K allocation easily. The ₹500K
    # number is purely a sizing-budget knob; it does not imply we
    # need to actually deposit ₹500K with a broker. When live trading
    # ships (Phase 5), this number is replaced by the real available
    # cash + margin from KiteConnect.
    total: 500000
    deployable_pct: 0.80
  risk:
    max_daily_loss_pct: 2.0
    # 2026-05-07 FIX #22: enforce the structural invariant
    #
    #   max_loss_per_trade_pct × max_open_positions ≤ max_daily_loss_pct
    #
    # i.e. even if EVERY currently-open trade hits its stop-loss at the
    # same moment, total drawdown stays inside the daily kill-switch
    # budget. Previously this was VIOLATED: per-trade=5.0 × open=5 = 25%
    # potential simultaneous loss, vs a 2% daily cap. The IC sizer
    # (bot/risk.py:305-311) used the per-trade budget to scale qty, so
    # on a 100-wide IC with credit ₹86 (SL-distance ₹9.71) it allocated
    # 6 lots = 450 contracts = ₹4,372 SL exposure per IC. Two such ICs
    # open simultaneously = ₹8,864 SL = 4.4× the daily kill-switch.
    # Today (2026-05-07 11:10 IST) the bot opened exactly that pair;
    # we squared off manually for a realised -₹528 vs the ₹8,864 tail.
    #
    # New defaults (1.0 × 2 = 2.0 = daily cap):
    #   * max_loss_per_trade_pct: 1.0  → 1 IC sized to int(1000/9.71) =
    #     103 contracts, floored to 1 lot of 75 (NIFTY) = ₹728 SL.
    #   * max_open_positions:    2    → at most 2 × ~₹730 ≈ ₹1,460 ≈
    #     1.46% simultaneous SL exposure, leaves the kill-switch a
    #     real chance to fire BEFORE the cap is breached.
    #   * max_trades_per_day:   10    → unchanged (frequency lever, not
    #     a risk lever — capital-at-risk is still bounded by the
    #     per-trade × open product above).
    #
    # The invariant is now also enforced at startup in bot/risk.py
    # (RiskManager.__init__ raises ConfigError if violated), so any
    # future YAML edit that re-introduces an unsafe ratio fails fast
    # instead of silently sizing the bot into another -₹8K tail.
    #
    # 2026-05-08 — Option-2: per-trade 1.0 → 1.6, max_open 2 → 1.
    # 1.6% × ₹500K = ₹8,000 sizing budget, which covers 1 NIFTY lot
    # at the typical ₹105/share SL distance (₹7,875). max_open=1
    # because (a) the strategy emits independent CE/PE entries that
    # are roughly opposite directional bets — running both at once
    # = whipsaw; (b) the invariant 1.6 × 1 = 1.6 ≤ 2.0 daily holds.
    # If live observation shows we're regularly missing trades because
    # one is open, raise max_open_positions to 2 AND lower per-trade
    # to 1.0 (1.0 × 2 = 2.0 ≤ 2.0 — still invariant-safe).
    max_loss_per_trade_pct: 1.6
    max_trades_per_day: 10
    max_open_positions: 1
    # For options: caps PREMIUM deployed at this % of capital. 50% means
    # one option position can use up to half the F&O budget.
    # For futures: caps margin deployed similarly.
    max_position_pct: 50.0
    reward_risk_ratio: 1.5
    trailing_stop: true
    sl_atr_mult: 2.0
    tp_atr_mult: 3.0
    trail_activation_r: 1.0
    trail_lock_r: 0.5
    trail_atr_mult: 1.5
    # 2026-05-08 — Option-2: 5.0 → 1.0. With capital bumped to ₹500K
    # the prior 5.0% target translated to a ₹25,000 daily lock-in,
    # 5x the user's ₹5K ceiling. 1.0% of ₹500K = ₹5,000 — keeps the
    # absolute lock-in at the SAME ₹5K threshold the bot has used
    # historically, so the operator's mental model doesn't shift.
    daily_profit_target_pct: 1.0
    # FIX #37 (2026-05-16) — Fee-aware entry gate (F&O). Same semantics
    # as the equity-side knob; option_buy_directional has the highest
    # fee-drag exposure (each round trip is ~₹100-150 of options STT +
    # GST + brokerage + exchange charges, against TP-gross of typically
    # ₹2K-15K per trade). 25% threshold leaves headroom against the
    # 60-day backtest's median fee/gross ratio of ~12%, so the gate
    # rejects only the genuinely-marginal entries.
    max_fee_pct_of_gross: 25.0
  watchlist:
    # Bare underlyings — resolved into futures tradingsymbol (Phase 2)
    # OR into ATM CE/PE option tradingsymbol at signal time (Phase 3).
    # FINNIFTY's yfinance coverage is unreliable — disabled here until
    # live broker bars land in Phase 5.
    symbols:
      - NIFTY
      - BANKNIFTY
  strategies:
    # 2026-05-08 — Option-2 strategy switch. The previous lineup
    # (credit_spread + iron_condor) lost ₹6,248 net over 10 trades / 3
    # live days because both are theta-collection plays that need
    # multi-day holds to realise their TP — incompatible with the
    # bot's intraday-only square-off at 15:15 IST. The 60-day backtest
    # confirmed the structural problem (0 wins on intraday theta).
    #
    # option_buy_directional is the opposite trade: long ATM CE on a
    # bullish EMA20/EMA50 cross, long ATM PE on a bearish cross.
    # Defined risk = full premium paid (~₹11,250/lot for NIFTY weekly
    # ATM at typical IV). Profits when the underlying makes a
    # favourable 0.3-0.5% intraday move — the canonical scenario for
    # an EMA-cross signal. 60-day backtest:
    #
    #   90 trades / 34 trading days  =  2.6 trades/day
    #   45 wins, 45 losses           =  50% win rate
    #   avg win  +₹3,825   avg loss -₹2,578   payoff 1.48
    #   net P&L (after fees)         =  +₹56,097
    #   median day                   =  +₹452
    #   max drawdown                 =  -₹10,793 (≈10% of ₹100K)
    #   fees                         =   ₹7,700 (12% of gross — clean)
    #
    # The earlier multi-strategy warning still applies if you want to
    # add futures_trend or credit_spread back: they operate on
    # incompatible numeric scales (₹24,000 spot vs ₹70 net credit) and
    # would need a separate F&O bot process per scale. For now we run
    # exactly one strategy.
    enabled:
      - option_buy_directional
    ensemble:
      min_agree: 1             # Either strategy fires alone (regime-aware)
    multitimeframe:
      enabled: false           # Phase 4.5: confirm via 15m EMA trend
    futures_trend:             # Used only when 'futures_trend' in `enabled`
      ema_fast: 20
      ema_slow: 50
      sl_atr_mult: 2.0
      tp_atr_mult: 3.0
      # How many recent bars qualify as a "fresh" EMA cross. 5 bars on the
      # 5m frame ≈ 25 min of freshness. Bumping to 10 ≈ 50 min lets the
      # strategy still enter on a cross that printed earlier in the
      # session — same EMA periods, same SL/TP, just a wider window.
      cross_lookback_bars: 10
    option_buy_directional:    # Used only when 'option_buy_directional' in `enabled`
      ema_fast: 20
      ema_slow: 50
      sl_atr_mult: 2.0
      tp_atr_mult: 3.0
      cross_lookback_bars: 10  # See futures_trend for explanation
      iv: 0.15
      risk_free_rate: 0.07
      # FIX #31 (2026-05-15): 0.30 → 0.65 — caps max allowed premium
      # drop at 35% before SL fires. See OptionBuyDirectionalCfg
      # docstring for the BANKNIFTY26MAY54200CE -₹22.7K postmortem.
      min_sl_premium_pct: 0.65
      # FIX #32 (2026-05-15) — Skip option-buy entries in low-realised-
      # vol "theta-trap" regimes. Today's 13:11 BANKNIFTY entry had
      # realised 1h vol of 9.32-10.77% and the premium decayed 36% by
      # EOD despite an EMA cross firing. Calibrated against 6 historical
      # signal events: a 12% floor blocks today's catastrophe (well
      # below threshold) while preserving every TP winner (≥14%). Set
      # to 0 to disable.
      min_realized_vol_pct: 0.12
      realized_vol_lookback_bars: 12     # 12 × 5m = 1h of bars
      # FIX #33 (2026-05-15) — RSI mean-reversion guard. Block CE buy
      # when RSI(14) ≥ 65 (price already overbought, EMA cross is a
      # late momentum signal firing at a local top). Block PE buy
      # when RSI ≤ 35 (mirror). Set to 100/0 to disable.
      rsi_period: 14
      rsi_overbought: 65.0
      rsi_oversold: 35.0
      # FIX #34 (2026-05-15) — Bollinger %B mean-reversion guard.
      # Block CE buy when %B ≥ 0.85 (close hugging upper band).
      # Block PE buy when %B ≤ 0.15. Set to 1.0/0.0 to disable.
      bb_period: 20
      bb_std: 2.0
      bb_upper_threshold: 0.85
      bb_lower_threshold: 0.15
      # FIX #35 (2026-05-15) — Multi-source price validation. Before
      # entering a trade, cross-check yfinance spot against NSE's
      # free public REST API. If divergence > 1% we refuse the
      # trade. Fail-open: if NSE is unreachable, proceed on
      # yfinance. Set to 0 to disable.
      multisource_max_divergence_pct: 1.0
    credit_spread:             # Used only when 'credit_spread' in `enabled'
      ema_fast: 20
      ema_slow: 50
      cross_lookback_bars: 10  # See futures_trend for explanation
      # Strike width in points between short and long legs.
      #   NIFTY:     50 / 100 / 200   (default 100)
      #   BANKNIFTY: 200 / 300 / 500  (default 200, override per-symbol later)
      strike_width: 100
      iv: 0.15                  # Black-Scholes IV for both legs
      risk_free_rate: 0.07
      # TP: lock in 50% of net credit (close when net price has decayed
      # to half of entry credit). Canonical intraday-credit-spread target.
      profit_lock_pct: 0.50
      # SL: cap loss at 70% of structural max_loss (close when net price
      # has risen by 70% of (width − credit) above entry).
      sl_max_loss_pct: 0.70
    iron_condor:               # Used only when 'iron_condor' in `enabled'
      ema_fast: 20
      ema_slow: 50
      # Trend-flatness threshold: |fast − slow| / spot. Below this we
      # treat the regime as consolidation and fire an iron condor.
      # 0.30% is mild — equivalent to a ~60-point spread at NIFTY 20K.
      ema_flat_threshold: 0.0030
      # Wing widths (protective-leg distances). Asymmetric (e.g.
      # put_width=100 / call_width=200) expresses a directional skew.
      put_width: 100
      call_width: 100
      # Distance from spot to the SHORT inner legs (the credit-bearing
      # ones). Larger values = lower credit but wider win zone.
      wings_distance: 100
      iv: 0.15
      risk_free_rate: 0.07
      profit_lock_pct: 0.50    # Close at 50% of credit decayed (TP)
      sl_max_loss_pct: 0.70    # Stop at 70% of structural max-loss
